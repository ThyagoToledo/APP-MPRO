<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>M-PRO - Mapas e Localização</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#331111",
                        "tertiary-container": "#5a302f",
                        "tertiary": "#401b1b",
                        "tertiary-fixed-dim": "#f5b7b4",
                        "primary-container": "#1a4332",
                        "on-secondary-container": "#217128",
                        "on-secondary-fixed": "#002204",
                        "on-background": "#1a1c1a",
                        "secondary-fixed": "#a3f69c",
                        "medicao-blue": "#2563EB",
                        "corrigir-red": "#DC2626",
                        "on-primary-fixed-variant": "#264e3d",
                        "surface-bright": "#f9faf6",
                        "primary-fixed-dim": "#a4d0b9",
                        "primary-fixed": "#c0edd4",
                        "outline-variant": "#c1c8c2",
                        "on-primary-fixed": "#002114",
                        "secondary-fixed-dim": "#88d982",
                        "surface-container-high": "#e8e8e5",
                        "on-error-container": "#93000a",
                        "text-technical": "#374151",
                        "on-secondary-fixed-variant": "#005312",
                        "primary": "#002d1d",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#3e6654",
                        "on-tertiary-fixed-variant": "#673a39",
                        "background": "#f9faf6",
                        "error-container": "#ffdad6",
                        "inverse-surface": "#2f312f",
                        "on-primary-container": "#85af99",
                        "error": "#ba1a1a",
                        "surface-container": "#eeeeeb",
                        "secondary-container": "#a0f399",
                        "on-error": "#ffffff",
                        "surface-dim": "#d9dad7",
                        "surface-variant": "#e2e3e0",
                        "monitorar-amber": "#F59E0B",
                        "border-subtle": "#E5E7EB",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#d29895",
                        "on-surface-variant": "#414944",
                        "inverse-on-surface": "#f0f1ee",
                        "on-primary": "#ffffff",
                        "outline": "#717973",
                        "neutral-surface": "#F9FAFB",
                        "surface": "#f9faf6",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#e2e3e0",
                        "inverse-primary": "#a4d0b9",
                        "tertiary-fixed": "#ffdad8",
                        "on-surface": "#1a1c1a",
                        "surface-container-low": "#f3f4f1",
                        "secondary": "#1b6d24"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "stack-loose": "24px",
                        "gutter-mobile": "16px",
                        "unit": "4px",
                        "stack-tight": "8px",
                        "margin-page": "16px",
                        "gutter-desktop": "24px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-md": ["Inter"],
                        "data-mono": ["JetBrains Mono"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "label-caps": ["11px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "data-mono": ["13px", { "lineHeight": "18px", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md antialiased overflow-hidden h-screen w-full flex flex-col relative select-none">
<!-- TOP APP BAR -->
<header class="fixed top-0 w-full z-50 bg-primary flex justify-between items-center h-16 px-4 transition-colors duration-200">
<button aria-label="Menu" class="text-on-primary p-2 hover:bg-primary-container/20 rounded-full transition-colors duration-200">
<span class="material-symbols-outlined block" data-icon="menu">menu</span>
</button>
<div class="font-headline-md text-headline-md font-bold text-on-primary tracking-tight">
            M-PRO
        </div>
<button aria-label="Account" class="text-on-primary p-2 hover:bg-primary-container/20 rounded-full transition-colors duration-200">
<span class="material-symbols-outlined block" data-icon="account_circle">account_circle</span>
</button>
</header>
<!-- MAP CONTAINER -->
<main class="flex-1 w-full relative mt-16 mb-20 bg-surface-container-high">
<!-- Interactive Map Background (Placeholder) -->
<div class="absolute inset-0 bg-cover bg-center w-full h-full z-0 opacity-80 mix-blend-multiply" data-alt="A highly detailed satellite view map of agricultural farmland from a top-down perspective, rendered with a professional agronomic tool aesthetic. The map shows distinct, neatly organized rectangular plots and circular irrigation pivots in varying shades of dark forest green, earthy browns, and muted olive. The lighting simulates clear daylight, emphasizing the structural boundaries of the fields with crisp, high-contrast edges. The mood is analytical and precise, fitting for a modern utility application." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC2SW7UnECQJXSGhXtcvnEEWPaW93NX3lLI8yLkXNogcJxdCKJaG_vYtPQyDy0GzNgzHnZtDADbmwbFd30XRMbx-be2fIT4Qg6gxQnT1fhqm7maeVeZQV4vAQbTx-rD5_vH8xlyj74u4bPYy3Yz6d9JfHMkTIbJdUg9GIdXkkhz2DejezYZX_kJCVEGMY87BCQdyC3x87TcKAcYvR4mysT8Ji4oIrnHQVNU0aSDCSL8etSVFJzLa5fxzw')"></div>
<!-- Search Bar Overlay -->
<div class="absolute top-gutter-mobile left-gutter-mobile right-gutter-mobile z-10">
<div class="bg-surface rounded-xl shadow-sm border border-outline-variant flex items-center px-4 h-12">
<span class="material-symbols-outlined text-on-surface-variant mr-3" data-icon="search">search</span>
<input class="flex-1 bg-transparent border-none outline-none text-on-surface font-body-md placeholder:text-on-surface-variant/60 focus:ring-0 px-0" placeholder="Buscar clientes ou propriedades..." type="text"/>
<button aria-label="Filter" class="text-on-surface-variant ml-3">
<span class="material-symbols-outlined" data-icon="tune">tune</span>
</button>
</div>
</div>
<!-- Map Controls -->
<div class="absolute top-24 right-gutter-mobile z-10 flex flex-col gap-unit">
<button aria-label="Layers" class="bg-surface rounded-full p-3 shadow-sm border border-outline-variant text-on-surface-variant active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</button>
<button aria-label="My Location" class="bg-surface rounded-full p-3 shadow-sm border border-outline-variant text-on-surface-variant active:scale-95 transition-transform mt-2">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
</div>
<!-- Map Markers (Simulated) -->
<div class="absolute top-1/3 left-1/4 z-10 -translate-x-1/2 -translate-y-1/2 cursor-pointer group">
<div class="w-10 h-10 bg-primary text-on-primary rounded-t-full rounded-bl-full rounded-br-sm rotate-45 flex items-center justify-center shadow-md border-2 border-surface">
<span class="material-symbols-outlined -rotate-45 text-[20px]" data-icon="agriculture">agriculture</span>
</div>
</div>
<div class="absolute top-1/2 left-2/3 z-10 -translate-x-1/2 -translate-y-1/2 cursor-pointer group">
<div class="w-12 h-12 bg-secondary text-on-secondary rounded-t-full rounded-bl-full rounded-br-sm rotate-45 flex items-center justify-center shadow-md border-2 border-surface scale-110">
<span class="material-symbols-outlined -rotate-45 text-[24px]" data-icon="eco">eco</span>
</div>
<!-- Active Indicator Pulse -->
<div class="absolute -bottom-2 -left-2 w-16 h-16 bg-secondary/30 rounded-full -z-10 animate-ping"></div>
</div>
<!-- Bottom Sheet Details -->
<div class="absolute bottom-4 left-gutter-mobile right-gutter-mobile z-20">
<div class="bg-surface rounded-xl shadow-lg border border-border-subtle overflow-hidden flex flex-col">
<!-- Header Status -->
<div class="h-2 w-full bg-monitorar-amber"></div>
<div class="p-gutter-mobile">
<div class="flex justify-between items-start mb-stack-tight">
<div>
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-1">Fazenda Santa Luzia</h2>
<p class="font-body-sm text-body-sm text-text-technical flex items-center">
<span class="material-symbols-outlined text-[16px] mr-1" data-icon="location_on">location_on</span>
                                Loteamento Sul, Setor 4
                            </p>
</div>
<div class="bg-monitorar-amber/10 text-monitorar-amber px-2 py-1 rounded border border-monitorar-amber/20 flex items-center">
<span class="material-symbols-outlined text-[14px] mr-1" data-icon="warning">warning</span>
<span class="font-label-caps text-label-caps">MONITORAR</span>
</div>
</div>
<div class="grid grid-cols-2 gap-stack-tight mb-stack-loose border-t border-border-subtle pt-3">
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant mb-1">ÁREA TOTAL</p>
<p class="font-data-mono text-data-mono text-on-surface">150 ha</p>
</div>
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant mb-1">ÚLTIMA VISITA</p>
<p class="font-data-mono text-data-mono text-on-surface">12/10/2023</p>
</div>
</div>
<div class="flex gap-stack-tight w-full">
<button class="flex-1 bg-surface-variant text-on-surface-variant font-body-md text-body-md font-medium py-3 rounded-lg flex items-center justify-center active:bg-surface-dim transition-colors">
<span class="material-symbols-outlined mr-2 text-[20px]" data-icon="visibility">visibility</span>
                            Ver Detalhes
                        </button>
<button class="flex-1 bg-primary text-on-primary font-body-md text-body-md font-medium py-3 rounded-lg flex items-center justify-center active:bg-primary-container transition-colors shadow-sm">
<span class="material-symbols-outlined mr-2 text-[20px]" data-icon="play_arrow">play_arrow</span>
                            Iniciar Visita
                        </button>
</div>
</div>
</div>
</div>
</main>
<!-- BOTTOM NAV BAR -->
<nav class="fixed bottom-0 w-full z-50 bg-surface border-t border-outline-variant flex justify-around items-center h-20 px-2 pb-safe">
<!-- Home (Active) -->
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined icon-fill mb-1" data-icon="home" data-weight="fill">home</span>
<span class="font-label-caps text-label-caps">Home</span>
</button>
<!-- Clientes -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-highest rounded-lg px-3 py-2 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined mb-1" data-icon="group">group</span>
<span class="font-label-caps text-label-caps">Clientes</span>
</button>
<!-- Nova Visita -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-highest rounded-lg px-3 py-2 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined mb-1" data-icon="add_circle">add_circle</span>
<span class="font-label-caps text-label-caps">Nova Visita</span>
</button>
<!-- Sincronizar -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-highest rounded-lg px-3 py-2 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined mb-1" data-icon="sync">sync</span>
<span class="font-label-caps text-label-caps">Sincronizar</span>
</button>
</nav>
<!-- Safe area spacing for iOS -->
<style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
    </style>
<script src="../mpro-prototype.js"></script>
</body></html>
