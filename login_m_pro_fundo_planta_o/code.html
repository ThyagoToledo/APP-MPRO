<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>M-PRO Login - Glassmorphism</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-styles">
    /* Background Image setup */
    body {
      background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAbRldTSGMG7pxAqdlIkmQBP6oFS_shyYpbgthZCbZHkekQo97Zx3Wto4fjrj5nuGVryrhKfO89S29SQcix88-jaFvxgymuX5d1sAa6V9xldfCXozXGLIHJOR_9zaJDH8tmitQDpOcA792jaFyihjfzh43L1J7DBUD8VfhyKr6kUpkXfsGlNtG9vXrGQtU7gsBayGsw3LmJBwrDRRpBQVX_MuArN4YdmsGJn1WjQaFvMz3EoqF77e44RmRvfF2K3_PIpnQ');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    /* Glassmorphism Effect */
    .glass-panel {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    /* Input Field Styling */
    .glass-input {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
    }
    .glass-input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }
    .glass-input:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(0, 0, 0, 0.3);
    }

    /* Button Gradient */
    .btn-gradient {
      background: linear-gradient(90deg, #a8e063 0%, #56ab2f 100%);
      transition: opacity 0.2s;
    }
    .btn-gradient:hover {
      opacity: 0.9;
    }

    /* Google Button Styling */
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: white;
      transition: background-color 0.2s;
    }
    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 antialiased text-white font-sans">
<!-- BEGIN: Login Container -->
<main class="w-full max-w-[400px]">
<!-- Glassmorphism Card -->
<div class="glass-panel rounded-3xl p-8 sm:p-10 w-full flex flex-col gap-8">
<!-- BEGIN: Header Section -->
<header class="flex flex-col gap-2">
<h1 class="text-4xl font-bold tracking-tight">Login</h1>
<p class="text-sm text-gray-200">Bem-vindo de volta. Entre na sua conta</p>
</header>
<!-- END: Header Section -->
<!-- BEGIN: Form Section -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Input Group -->
<div class="flex flex-col gap-4">
<!-- Email Input -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<!-- User Icon SVG -->
<svg class="h-5 w-5 text-gray-300" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="glass-input w-full rounded-xl py-3 pl-11 pr-4 text-sm" id="email" placeholder="E-mail ou nome de usuário" required="" type="text"/>
</div>
<!-- Password Input -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<!-- Lock Icon SVG -->
<svg class="h-5 w-5 text-gray-300" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="glass-input w-full rounded-xl py-3 pl-11 pr-11 text-sm" id="password" placeholder="Senha" required="" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer">
<!-- Eye Off Icon SVG -->
<svg class="h-5 w-5 text-gray-300 hover:text-white transition-colors" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between text-sm">
<label class="flex items-center gap-2 cursor-pointer">
<input class="rounded text-[#56ab2f] focus:ring-[#56ab2f] bg-transparent border-white/40 border-2 w-4 h-4 cursor-pointer" type="checkbox"/>
<span class="text-gray-200">Lembrar de mim</span>
</label>
<a class="text-gray-200 hover:text-white transition-colors" href="#">Esqueci minha senha?</a>
</div>
<!-- Submit Button -->
<button class="btn-gradient w-full py-3.5 rounded-xl font-semibold text-lg shadow-lg" type="submit">
          Entrar
        </button>
</form>
<!-- END: Form Section -->
<!-- BEGIN: Social Login & Register Link -->
<div class="flex flex-col gap-6">
<!-- Divider -->
<div class="flex items-center gap-4 text-sm text-gray-300">
<div class="flex-1 h-px bg-white/30"></div>
<span>ou</span>
<div class="flex-1 h-px bg-white/30"></div>
</div>
<!-- Google Button -->
<button class="btn-outline w-full py-3 rounded-xl flex items-center justify-center gap-3 font-medium" type="button">
<!-- Google G Logo SVG Placeholder -->
<svg class="w-5 h-5" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.7 17.74 9.5 24 9.5z" fill="#EA4335"></path>
<path d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" fill="#4285F4"></path>
<path d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" fill="#FBBC05"></path>
<path d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" fill="#34A853"></path>
<path d="M0 0h48v48H0z" fill="none"></path>
</svg>
          Continuar com Google
        </button>
<!-- Register Link -->
<p class="text-center text-sm text-gray-200">
          Não tem uma conta? <a class="text-[#a8e063] font-semibold hover:underline" href="#">Cadastre-se</a>
</p>
</div>
<!-- END: Social Login & Register Link -->
</div>
</main>
<!-- END: Login Container -->
<script src="../mpro-prototype.js"></script>
</body></html>
